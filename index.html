<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pkgui — Universal Package Manager GUI</title>
  <meta name="description" content="A terminal GUI for 40+ package managers. OS detection, command builder, xterm.js powered." />
  <meta name="theme-color" content="#0d1117" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">📦</span>
          <span class="logo-text">pkgui</span>
          <span class="logo-version">v<span id="version-tag">1.0.0</span></span>
        </div>
      </div>

      <!-- OS Detection Banner -->
      <div id="os-banner" class="os-banner">
        <div class="os-banner-label">Detected OS</div>
        <div class="os-banner-value" id="detected-os">
          <span class="os-icon" id="os-icon">🔍</span>
          <span id="os-name">Detecting...</span>
        </div>
        <button class="btn-ghost btn-sm" id="btn-detect">Re-detect</button>
      </div>

      <!-- Manager Search -->
      <div class="search-box">
        <input
          type="text"
          id="manager-search"
          placeholder="Search managers..."
          autocomplete="off"
          spellcheck="false"
        />
        <span class="search-icon">⌕</span>
      </div>

      <!-- OS Filter Tabs -->
      <div class="os-tabs" id="os-tabs">
        <button class="os-tab active" data-os="all">All</button>
        <button class="os-tab" data-os="linux">Linux</button>
        <button class="os-tab" data-os="macos">macOS</button>
        <button class="os-tab" data-os="windows">Windows</button>
        <button class="os-tab" data-os="bsd">BSD</button>
        <button class="os-tab" data-os="cross">Cross</button>
        <button class="os-tab" data-os="lang">Lang</button>
      </div>

      <!-- Manager List -->
      <div class="manager-list" id="manager-list">
        <!-- Populated by JS -->
      </div>

      <!-- Bottom Actions -->
      <div class="sidebar-footer">
        <div class="theme-switcher">
          <span class="theme-label">Theme</span>
          <div class="theme-options">
            <button class="theme-dot active" data-theme="dark" title="Dark"></button>
            <button class="theme-dot" data-theme="light" title="Light"></button>
            <button class="theme-dot" data-theme="dracula" title="Dracula"></button>
            <button class="theme-dot" data-theme="nord" title="Nord"></button>
          </div>
        </div>
        <a href="https://github.com" class="sidebar-link" id="github-link" target="_blank" rel="noopener">
          <span>GitHub</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
      </div>
    </aside>

    <!-- Main Panel -->
    <main id="main">
      <!-- Toolbar -->
      <div class="toolbar" id="toolbar">
        <div class="toolbar-left">
          <button class="btn-icon" id="btn-sidebar-toggle" title="Toggle sidebar">☰</button>
          <div class="breadcrumb">
            <span class="breadcrumb-root">pkgui</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current" id="current-manager-name">No manager selected</span>
          </div>
        </div>

        <div class="toolbar-center">
          <!-- Quick action bar -->
          <div class="quick-actions" id="quick-actions">
            <button class="qa-btn" data-action="install" title="Install">⬇ Install</button>
            <button class="qa-btn" data-action="remove" title="Remove">🗑 Remove</button>
            <button class="qa-btn" data-action="update" title="Update Index">↻ Update</button>
            <button class="qa-btn" data-action="upgrade" title="Upgrade All">⬆ Upgrade</button>
            <button class="qa-btn" data-action="search" title="Search">⌕ Search</button>
            <button class="qa-btn" data-action="list" title="List Packages">≡ List</button>
            <button class="qa-btn" data-action="clean" title="Clean">✧ Clean</button>
          </div>
        </div>

        <div class="toolbar-right">
          <div class="pkg-input-wrap" id="pkg-input-wrap">
            <input
              type="text"
              id="pkg-input"
              placeholder="package name..."
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <button class="btn-icon" id="btn-clear" title="Clear terminal">⊗</button>
          <button class="btn-icon" id="btn-copy-last" title="Copy last command">⎘</button>
        </div>
      </div>

      <!-- Terminal Container -->
      <div id="terminal-container">
        <div id="terminal"></div>
      </div>

      <!-- Command Output Panel (bottom) -->
      <div id="output-panel" class="output-panel hidden">
        <div class="output-panel-header">
          <span class="output-panel-title">Last Command</span>
          <div class="output-panel-actions">
            <button class="btn-ghost btn-sm" id="btn-copy-cmd">Copy</button>
            <button class="btn-ghost btn-sm" id="btn-close-output">✕</button>
          </div>
        </div>
        <div class="output-panel-body">
          <code id="output-cmd"></code>
        </div>
      </div>
    </main>

    <!-- Compare Modal -->
    <div id="compare-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Compare: <span id="compare-pkg-name"></span></h2>
          <button class="btn-icon" id="btn-close-compare">✕</button>
        </div>
        <div class="modal-body" id="compare-body">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
