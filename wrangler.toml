name = "pkgui"
main = "worker/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Static assets (Cloudflare Pages style) ──────────────────────────────────
[assets]
directory = "./dist"
binding = "ASSETS"

# ─── KV Namespace (optional: for caching API responses) ──────────────────────
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# ─── Environment variables ────────────────────────────────────────────────────
[vars]
PKGUI_VERSION = "1.0.0"

# ─── Development ──────────────────────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"
