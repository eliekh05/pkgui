name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint & Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true   # non-fatal until ESLint config is set up

      - name: Test
        run: npm test

  # ─── Build (main branch → normal code output) ─────────────────────────────
  build-main:
    name: Build (main)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build SPA + Worker
        run: npm run build:all
        env:
          NODE_ENV: production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkgui-dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─── Release Build (tag → compiled single-file bundle for GitHub Releases) ──
  release:
    name: GitHub Release
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build normal dist (for Pages deploy)
        run: npm run build:all
        env:
          NODE_ENV: production

      - name: Build SINGLE-FILE bundle (for GitHub Release)
        run: |
          BUNDLE_SINGLE=1 npx vite build --outDir dist-bundle
          # Inline all assets into one HTML file using a post-processor
          node scripts/inline-bundle.js
        env:
          NODE_ENV: production
          VITE_VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Package release artifacts
        run: node scripts/package.js ${{ steps.version.outputs.VERSION }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges | head -30)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: pkgui v${{ steps.version.outputs.VERSION }}
          tag_name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## 📦 pkgui v${{ steps.version.outputs.VERSION }}

            Universal Package Manager GUI — 40+ managers, OS detection, xterm.js powered.

            ### 📥 Downloads

            | File | Description |
            |------|-------------|
            | `pkgui-${{ steps.version.outputs.VERSION }}-bundle.html` | **Single-file** — open in browser, no server needed |
            | `pkgui-${{ steps.version.outputs.VERSION }}-dist.zip` | Full build for self-hosting / Cloudflare Pages |
            | `pkgui-${{ steps.version.outputs.VERSION }}-worker.js` | Cloudflare Worker script only |
            | `pkgui-${{ steps.version.outputs.VERSION }}-source.tar.gz` | Source tarball |

            ### 🚀 Quick Start
            ```bash
            # Option 1: Open the single-file bundle directly
            open pkgui-${{ steps.version.outputs.VERSION }}-bundle.html

            # Option 2: Deploy to Cloudflare Pages
            unzip pkgui-${{ steps.version.outputs.VERSION }}-dist.zip
            wrangler pages deploy dist/ --project-name=pkgui

            # Option 3: Self-host
            unzip pkgui-${{ steps.version.outputs.VERSION }}-dist.zip
            npx serve dist/
            ```

            ### 📝 Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ---
            Built from commit `${{ github.sha }}`
          files: |
            release/pkgui-${{ steps.version.outputs.VERSION }}-bundle.html
            release/pkgui-${{ steps.version.outputs.VERSION }}-dist.zip
            release/pkgui-${{ steps.version.outputs.VERSION }}-worker.js
            release/pkgui-${{ steps.version.outputs.VERSION }}-source.tar.gz
          draft: false
          prerelease: false

  # ─── Deploy Worker separately ────────────────────────────────────────────
  deploy-worker:
    name: Deploy Cloudflare Worker
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build worker bundle
        run: npm run build:worker

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
        env:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
