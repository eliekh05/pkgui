name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Run tests on every push and PR ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test

  # ─── Build on every push to main — proves main always compiles ───────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NODE_ENV: production

      - uses: actions/upload-artifact@v4
        with:
          name: pkgui-dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─── Auto-release on push to main when there are unreleased commits ──────────
  #
  #  Push to main → CI tests, then publishes a release if HEAD is ahead of the
  #  latest tag. Version is taken from package.json, or patch-bumped from the
  #  latest tag when that version was already released.
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
      skip: ${{ steps.ver.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve version
        id: ver
        run: |
          git fetch --tags --force

          PKG_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)

          # Nothing new since the last release
          if [ -n "$LATEST_TAG" ] && [ "$(git rev-parse HEAD)" = "$(git rev-parse "$LATEST_TAG")" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "HEAD already released as $LATEST_TAG — skipping."
            exit 0
          fi

          if git rev-parse "v$PKG_VERSION" >/dev/null 2>&1; then
            # package.json version already released — bump patch from latest tag
            LATEST_VER="${LATEST_TAG#v}"
            MAJOR=$(echo "$LATEST_VER" | cut -d. -f1)
            MINOR=$(echo "$LATEST_VER" | cut -d. -f2)
            PATCH=$(echo "$LATEST_VER" | cut -d. -f3 | sed 's/-.*//')
            VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "v$PKG_VERSION already released — using v$VERSION"
          else
            VERSION="$PKG_VERSION"
          fi

          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — skipping."
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Will publish $TAG"

      - name: Build SPA
        if: steps.ver.outputs.skip != 'true'
        run: npm run build
        env:
          NODE_ENV: production
          VITE_VERSION: ${{ steps.ver.outputs.VERSION }}

      - name: Build single-file bundle
        if: steps.ver.outputs.skip != 'true'
        run: |
          BUNDLE_SINGLE=1 npx vite build --outDir dist-bundle
          node scripts/inline-bundle.js
        env:
          NODE_ENV: production
          VITE_VERSION: ${{ steps.ver.outputs.VERSION }}

      - name: Package artifacts
        if: steps.ver.outputs.skip != 'true'
        run: node scripts/package.js ${{ steps.ver.outputs.VERSION }}

      - name: Generate changelog
        if: steps.ver.outputs.skip != 'true'
        run: |
          PREV=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV" ]; then
            git log ${PREV}..HEAD --pretty=format:"- %s" --no-merges | head -40 > /tmp/changelog.md
          else
            git log --pretty=format:"- %s" --no-merges | head -20 > /tmp/changelog.md
          fi

      - name: Create GitHub Release
        if: steps.ver.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.VERSION }}
          TAG: ${{ steps.ver.outputs.TAG }}
          SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "pkgui $TAG"
          git push origin "$TAG"

          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          {
            echo "## 📦 pkgui v${VERSION}"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| File | Description |"
            echo "|------|-------------|"
            echo "| \`pkgui-${VERSION}-standalone.zip\` | **Recommended** — unzip, run \`./start\` or \`npm run server\` — UI + exec in one step |"
            echo "| \`pkgui-${VERSION}-bundle.html\` | Single HTML file only (no command execution unless served via server.js) |"
            echo "| \`pkgui-${VERSION}-dist.zip\` | Full build output for self-hosting |"
            echo "| \`pkgui-${VERSION}-source.tar.gz\` | Source tarball |"
            echo ""
            echo "### Changes"
            cat /tmp/changelog.md
            echo ""
            echo "---"
            echo "Built from \`${SHA}\`"
          } > /tmp/release-notes.md

          gh release create "$TAG" \
            --title "pkgui v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            $PRERELEASE_FLAG \
            "release/pkgui-${VERSION}-standalone.zip" \
            "release/pkgui-${VERSION}-bundle.html" \
            "release/pkgui-${VERSION}-dist.zip" \
            "release/pkgui-${VERSION}-source.tar.gz"

  # GITHUB_TOKEN releases don't fire release:published for other workflows,
  # so call the npm publish workflow directly after a successful release.
  publish-npm:
    name: Publish to npm
    needs: release
    if: needs.release.outputs.skip != 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/publish-npm.yml
    with:
      version: ${{ needs.release.outputs.version }}
