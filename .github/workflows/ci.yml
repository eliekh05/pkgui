name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Run tests on every push and PR ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test

  # ─── Build on every push to main — proves main always compiles ───────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NODE_ENV: production

      - uses: actions/upload-artifact@v4
        with:
          name: pkgui-dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─── Auto-release on push to main when there are unreleased commits ──────────
  #
  #  Push to main → CI tests, then publishes a release if HEAD is ahead of the
  #  latest tag. Version is taken from package.json, or patch-bumped from the
  #  latest tag when that version was already released.
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve version
        id: ver
        run: |
          git fetch --tags --force

          PKG_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)

          # Nothing new since the last release
          if [ -n "$LATEST_TAG" ] && [ "$(git rev-parse HEAD)" = "$(git rev-parse "$LATEST_TAG")" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "HEAD already released as $LATEST_TAG — skipping."
            exit 0
          fi

          if git rev-parse "v$PKG_VERSION" >/dev/null 2>&1; then
            # package.json version already released — bump patch from latest tag
            LATEST_VER="${LATEST_TAG#v}"
            MAJOR=$(echo "$LATEST_VER" | cut -d. -f1)
            MINOR=$(echo "$LATEST_VER" | cut -d. -f2)
            PATCH=$(echo "$LATEST_VER" | cut -d. -f3 | sed 's/-.*//')
            VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "v$PKG_VERSION already released — using v$VERSION"
          else
            VERSION="$PKG_VERSION"
          fi

          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — skipping."
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Will publish $TAG"

      - name: Build SPA
        if: steps.ver.outputs.skip != 'true'
        run: npm run build
        env:
          NODE_ENV: production
          VITE_VERSION: ${{ steps.ver.outputs.VERSION }}

      - name: Build single-file bundle
        if: steps.ver.outputs.skip != 'true'
        run: |
          BUNDLE_SINGLE=1 npx vite build --outDir dist-bundle
          node scripts/inline-bundle.js
        env:
          NODE_ENV: production
          VITE_VERSION: ${{ steps.ver.outputs.VERSION }}

      - name: Package artifacts
        if: steps.ver.outputs.skip != 'true'
        run: node scripts/package.js ${{ steps.ver.outputs.VERSION }}

      - name: Generate changelog
        if: steps.ver.outputs.skip != 'true'
        id: log
        run: |
          PREV=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV" ]; then
            BODY=$(git log ${PREV}..HEAD --pretty=format:"- %s" --no-merges | head -40)
          else
            BODY=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY"    >> $GITHUB_OUTPUT
          echo "EOF"      >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.ver.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: pkgui v${{ steps.ver.outputs.VERSION }}
          tag_name: v${{ steps.ver.outputs.VERSION }}
          prerelease: ${{ contains(steps.ver.outputs.VERSION, '-') }}
          body: |
            ## 📦 pkgui v${{ steps.ver.outputs.VERSION }}

            ### Downloads

            | File | Description |
            |------|-------------|
            | `pkgui-${{ steps.ver.outputs.VERSION }}-standalone.zip` | **Recommended** — unzip, run `./start` or `npm run server` — UI + exec in one step |
            | `pkgui-${{ steps.ver.outputs.VERSION }}-bundle.html` | Single HTML file only (no command execution unless served via server.js) |
            | `pkgui-${{ steps.ver.outputs.VERSION }}-dist.zip` | Full build output for self-hosting |
            | `pkgui-${{ steps.ver.outputs.VERSION }}-source.tar.gz` | Source tarball |

            ### Changes
            ${{ steps.log.outputs.BODY }}

            ---
            Built from `${{ github.sha }}`
          files: |
            release/pkgui-${{ steps.ver.outputs.VERSION }}-standalone.zip
            release/pkgui-${{ steps.ver.outputs.VERSION }}-bundle.html
            release/pkgui-${{ steps.ver.outputs.VERSION }}-dist.zip
            release/pkgui-${{ steps.ver.outputs.VERSION }}-source.tar.gz
