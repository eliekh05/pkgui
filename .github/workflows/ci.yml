name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Run tests on every push and PR ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test

  # ─── Build on every push to main — proves main always compiles ───────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NODE_ENV: production

      - uses: actions/upload-artifact@v4
        with:
          name: pkgui-dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─── Auto-release when package.json version is new ───────────────────────────
  #
  #  Bump "version" in package.json, push to main → CI tests, builds, and
  #  publishes a GitHub Release (tag v{version} + bundle.html + zip + tarball).
  #
  #  To release:
  #    npm version patch   # or minor / major
  #    git push origin main --follow-tags   # optional: tag is created by CI instead
  #    git push origin main
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve version
        id: ver
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version $VERSION"

      - name: Skip if tag already exists
        id: check
        run: |
          git fetch --tags --force
          if git rev-parse "${{ steps.ver.outputs.TAG }}" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.ver.outputs.TAG }} already exists — skipping release."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "New version — will publish ${{ steps.ver.outputs.TAG }}."
          fi

      - name: Build SPA
        if: steps.check.outputs.skip != 'true'
        run: npm run build
        env:
          NODE_ENV: production
          VITE_VERSION: ${{ steps.ver.outputs.VERSION }}

      - name: Build single-file bundle
        if: steps.check.outputs.skip != 'true'
        run: |
          BUNDLE_SINGLE=1 npx vite build --outDir dist-bundle
          node scripts/inline-bundle.js
        env:
          NODE_ENV: production
          VITE_VERSION: ${{ steps.ver.outputs.VERSION }}

      - name: Package artifacts
        if: steps.check.outputs.skip != 'true'
        run: node scripts/package.js ${{ steps.ver.outputs.VERSION }}

      - name: Generate changelog
        if: steps.check.outputs.skip != 'true'
        id: log
        run: |
          PREV=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV" ]; then
            BODY=$(git log ${PREV}..HEAD --pretty=format:"- %s" --no-merges | head -40)
          else
            BODY=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY"    >> $GITHUB_OUTPUT
          echo "EOF"      >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: pkgui v${{ steps.ver.outputs.VERSION }}
          tag_name: v${{ steps.ver.outputs.VERSION }}
          prerelease: ${{ contains(steps.ver.outputs.VERSION, '-') }}
          body: |
            ## 📦 pkgui v${{ steps.ver.outputs.VERSION }}

            ### Downloads

            | File | Description |
            |------|-------------|
            | `pkgui-${{ steps.ver.outputs.VERSION }}-bundle.html` | **Single compiled file** — open directly in any browser, zero install |
            | `pkgui-${{ steps.ver.outputs.VERSION }}-dist.zip` | Full build output for self-hosting |
            | `pkgui-${{ steps.ver.outputs.VERSION }}-source.tar.gz` | Source tarball |

            ### Changes
            ${{ steps.log.outputs.BODY }}

            ---
            Built from `${{ github.sha }}`
          files: |
            release/pkgui-${{ steps.ver.outputs.VERSION }}-bundle.html
            release/pkgui-${{ steps.ver.outputs.VERSION }}-dist.zip
            release/pkgui-${{ steps.ver.outputs.VERSION }}-source.tar.gz
