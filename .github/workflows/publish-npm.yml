name: Publish to npm

# Auto-triggered only via workflow_call from CI / CD after a GitHub Release.
# (GITHUB_TOKEN releases do not fire release:published for other workflows.)
#
# Trusted Publishing: https://docs.npmjs.com/trusted-publishers/
#   Owner: eliekh05  Repo: pkgui  Workflow: publish-npm.yml
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify npm supports trusted publishing
        run: |
          echo "npm $(npm --version)"
          npm install -g npm@latest
          echo "upgraded to npm $(npm --version)"

      - name: Set version
        id: ver
        run: |
          VERSION="${{ inputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - run: npm ci
      - run: npm test

      - name: Build bundle for npm package
        run: VITE_VERSION="${{ steps.ver.outputs.VERSION }}" node scripts/prepare-npm.mjs
        env:
          NODE_ENV: production

      - name: Publish to npm
        run: npm publish --access public
